[[contents]]
type        = "post"
title       = "How to Compare Office Rent Beyond the Headline Number"
slug        = "compare-office-rent-beyond-headline-number"
image_url   = "https://images.unsplash.com/photo-1497366811353-6870744d04b2?w=1000&h=720&fit=crop&q=82"
sort_order  = 1
category    = "cat-market-intelligence"
tags        = ["tag-tenant-strategy", "tag-lease-terms"]
excerpt     = "Headline rent is only one part of occupancy cost. Layout efficiency, concessions, operating expenses, and timing change the real number."
content     = """<p>Two office spaces with the same quoted rent can perform very differently once you account for usable layout, free rent, improvement allowance, operating expenses, parking, and move timing.</p>
<p>A good comparison model converts these pieces into a common view so teams can evaluate cost, risk, and operational fit together.</p>"""

[[contents]]
type        = "post"
title       = "Why Retail Corners Need a Different Tour Checklist"
slug        = "retail-corners-tour-checklist"
image_url   = "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1000&h=720&fit=crop&q=82"
sort_order  = 2
category    = "cat-retail-leasing"
tags        = ["tag-retail-corridor", "tag-lease-terms"]
excerpt     = "Frontage, utilities, deliveries, pedestrian rhythm, and use restrictions can matter more than the first impression of the storefront."
content     = """<p>Retail tours should start outside. Watch pedestrian flow, sightlines, neighboring uses, delivery movements, and how the corner behaves at different times of day.</p>
<p>Inside, the practical checklist includes ceiling height, existing utilities, restroom conditions, venting path, storage, signage rules, and the landlord's willingness to participate in improvements.</p>"""

[[contents]]
type        = "post"
title       = "Shortlisting Flex Space for Operational Teams"
slug        = "shortlisting-flex-space-operational-teams"
image_url   = "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=1000&h=720&fit=crop&q=82"
sort_order  = 3
category    = "cat-industrial-flex"
tags        = ["tag-tenant-strategy", "tag-downtown"]
excerpt     = "Flex users need to balance loading, storage, office comfort, customer access, and local approvals before they compare rent."
content     = """<p>Flex space is usually selected through operations first. Loading, delivery timing, power, parking, and staging often determine whether a building works.</p>
<p>After operational fit is established, teams can compare office ratio, customer-facing presentation, commute logic, and total cost with more confidence.</p>"""
