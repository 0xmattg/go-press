# ============================================================
# FEATURES  (type = "feature")
# ============================================================

[[contents]]
type        = "feature"
title       = "Neural Compute Engine"
slug        = "neural-compute-engine"
sort_order  = 1
excerpt     = "Custom hardware-accelerated inference delivering sub-millisecond response times across GPU, TPU, and custom silicon."
content     = "<p>Our inference runtime is built from the ground up for production workloads. Automatic batching, dynamic quantisation, and kernel fusion reduce latency by 10× compared to stock serving frameworks. Supports NVIDIA A100/H100, Google TPU v5, and AWS Inferentia.</p>"
[contents.meta]
icon = "compute"

[[contents]]
type        = "feature"
title       = "Auto-Scaling Mesh"
slug        = "auto-scaling-mesh"
sort_order  = 2
excerpt     = "Kubernetes-native auto-scaling from zero to millions of requests per second. Scale-to-zero when idle — pay only for what you use."
content     = "<p>Built on an intelligent mesh layer that monitors queue depth, latency percentiles, and GPU utilisation in real time. Scales horizontally across availability zones with sub-second reaction time. Cold-start optimised with pre-warmed model pools.</p>"
[contents.meta]
icon = "scale"

[[contents]]
type        = "feature"
title       = "Model Observatory"
slug        = "model-observatory"
sort_order  = 3
excerpt     = "Real-time model performance dashboards, data drift detection, and automated retraining triggers — all in one pane of glass."
content     = "<p>Track accuracy, latency, throughput, and feature importance in real time. Built-in statistical tests (PSI, KS, Jensen-Shannon) detect data and concept drift before it impacts your users. Trigger retraining pipelines automatically or with one click.</p>"
[contents.meta]
icon = "monitor"

[[contents]]
type        = "feature"
title       = "Edge Deployment"
slug        = "edge-deployment"
sort_order  = 4
excerpt     = "Push models to 200+ edge locations worldwide with one command. Sub-10ms inference at the network edge, globally."
content     = "<p>Our edge runtime compiles models into optimised WASM or native binaries that run on Cloudflare Workers, AWS Lambda@Edge, or your own edge hardware. Automatic A/B routing and rollback included. Perfect for real-time recommendation, fraud detection, and content personalisation.</p>"
[contents.meta]
icon = "edge"

[[contents]]
type        = "feature"
title       = "Data Fabric"
slug        = "data-fabric"
sort_order  = 5
excerpt     = "Unified data access layer connecting warehouses, lakes, and streams — without moving data. Feature stores built in."
content     = "<p>NovaPulse Data Fabric provides a single SQL-like interface to Snowflake, BigQuery, Databricks, Kafka, and S3. Built-in feature store with point-in-time correctness ensures training-serving consistency. No ETL pipelines required.</p>"
[contents.meta]
icon = "data"

[[contents]]
type        = "feature"
title       = "Zero-Trust Security"
slug        = "zero-trust-security"
sort_order  = 6
excerpt     = "End-to-end encryption, SOC 2 Type II certified, HIPAA-ready infrastructure with granular RBAC and audit logging."
content     = "<p>Every API call is authenticated, authorised, and encrypted. Model weights are encrypted at rest (AES-256) and in transit (TLS 1.3). Fine-grained RBAC with team-based access control. Full audit trail for every deployment, prediction, and configuration change.</p>"
[contents.meta]
icon = "security"

