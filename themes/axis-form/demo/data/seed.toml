[[contents]]
type        = "post"
title       = "Designing Homes Around Daily Rituals"
slug        = "designing-homes-around-daily-rituals"
image_url   = "https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?w=1000&h=720&fit=crop&q=82"
sort_order  = 1
category    = "cat-studio-notes"
tags        = ["tag-modern-homes", "tag-interiors"]
excerpt     = "Enduring homes begin with routine: arrival, light, cooking, quiet, storage, work, gathering, and retreat."
content     = """<p>Residential design becomes stronger when the first conversation is not about style, but about daily rituals. The most useful homes make repeated actions feel natural and calm.</p>
<p>At Axis Form we map mornings, work hours, hosting patterns, storage needs, and evening transitions before choosing a formal direction. This keeps the final architecture tied to lived behavior.</p>"""

[[contents]]
type        = "post"
title       = "Material Palettes for Warm Minimalism"
slug        = "material-palettes-for-warm-minimalism"
image_url   = "https://images.unsplash.com/photo-1600121848594-d8644e57abab?w=1000&h=720&fit=crop&q=82"
sort_order  = 2
category    = "cat-studio-notes"
tags        = ["tag-materials", "tag-interiors"]
excerpt     = "Warm minimalism depends on texture, proportion, and light rather than empty rooms or decorative excess."
content     = """<p>Minimal spaces can feel generous when materials do more than fill a specification sheet. Grain, weave, stone movement, patina, and indirect light create atmosphere without clutter.</p>
<p>The discipline is in choosing fewer surfaces and letting them work harder across touch, reflection, durability, and maintenance.</p>"""

[[contents]]
type        = "post"
title       = "Why Project Management Belongs in Design"
slug        = "why-project-management-belongs-in-design"
image_url   = "https://images.unsplash.com/photo-1552664730-d307ca884978?w=1000&h=720&fit=crop&q=82"
sort_order  = 3
category    = "cat-studio-notes"
tags        = ["tag-delivery", "tag-urban-planning"]
excerpt     = "Design intent survives construction when coordination, cost checks, and site decisions are treated as part of design work."
content     = """<p>A beautiful concept can lose coherence if delivery is treated as a separate administrative phase. Site questions, procurement substitutions, schedule pressure, and budget choices all reshape the final space.</p>
<p>That is why Axis Form keeps project management close to design leadership. The point is not control for its own sake; it is clarity for everyone building the work.</p>"""
