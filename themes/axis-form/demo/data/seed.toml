<p>The first phase gathers the site story, spatial ambitions, approvals path, budget frame, and operational needs that will shape every later decision.</p>
<h3>Deliverables</h3>
<ul>
<li>Client interview and site-read summary</li>
<li>Project goals, risks, and approval assumptions</li>
<li>Early program, area, and budget outline</li>
</ul>"""

