[[contents]]
type = "post"
title = "Why launch pages need sequence, not decoration"
slug = "why-launch-pages-need-sequence"
image_url = "https://images.unsplash.com/photo-1522542550221-31fd19575a2d?w=1200&h=800&fit=crop&q=80"
sort_order = 1
category = "cat-studio-notes"
tags = ["tag-editorial-web", "tag-narrative-design"]
excerpt = "A launch page succeeds when it moves the reader through proof, tension, product clarity, and action in the right order."
content = """<h3>Sequence creates trust</h3><p>Decoration can make a page feel expensive for a moment, but sequence makes it useful. The visitor needs a clear first claim, a specific problem, proof that the team understands the market, and a next action that does not feel premature.</p><p>That is why our pages often use visible numbers, constrained sections, and compact copy. The structure tells the reader where they are and what decision comes next.</p>"""

[[contents]]
type = "post"
title = "Using tactile imagery in digital product storytelling"
slug = "using-tactile-imagery"
image_url = "https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=1200&h=800&fit=crop&q=80"
sort_order = 2
category = "cat-field-signals"
tags = ["tag-campaign-assets", "tag-founder-story"]
excerpt = "Material imagery can make abstract technology feel specific, physical, and easier to remember."
content = """<h3>Texture makes technology legible</h3><p>Abstract products often need a physical visual anchor. Wood, stone, paper, glass, metal, and shadow can give a digital idea weight without pretending to be literal product photography.</p><p>The rule is restraint: one strong material language is better than a collage of unrelated effects.</p>"""

[[contents]]
type = "post"
title = "The founder story is an interface"
slug = "founder-story-is-an-interface"
image_url = "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200&h=800&fit=crop&q=80"
sort_order = 3
category = "cat-studio-notes"
tags = ["tag-founder-story", "tag-narrative-design"]
excerpt = "A founder narrative should help readers navigate conviction, timing, proof, and risk."
content = """<h3>Story as navigation</h3><p>A founder story is not a biography pasted onto an about page. It is an interface for trust. It should help the reader understand why this team sees the problem clearly, why now matters, and why the proposed product has earned attention.</p>"""
