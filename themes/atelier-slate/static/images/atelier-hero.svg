<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950" role="img" aria-label="Abstract dark slate and carved wood studio object">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070707"/>
      <stop offset="0.58" stop-color="#242628"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d5d9dc"/>
      <stop offset="0.3" stop-color="#70777b"/>
      <stop offset="0.7" stop-color="#151719"/>
      <stop offset="1" stop-color="#040404"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
