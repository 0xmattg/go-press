category    = "product"
tags        = ["stablecoin", "payments"]
excerpt     = "Stablecoin products work best when they hide operational complexity and make money movement feel familiar."
content     = """<p>Stablecoin infrastructure can be complex, but users need a simple mental model: deposit, hold, transfer, redeem, and understand what happened.</p>
<p>FloraFi is designed around that product principle. It keeps reserve, yield, and settlement details available without forcing every user to become a treasury operator.</p>"""

[[contents]]
type        = "post"
title       = "Designing Treasury Views for Digital-Dollar Balances"
slug        = "designing-treasury-views"
image_url   = "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=900&h=650&fit=crop&q=80"
sort_order  = 2
category    = "treasury"
tags        = ["treasury-management", "yield", "compliance"]
excerpt     = "Finance teams need allocation, liquidity, and reconciliation views before stablecoin balances can become operational."
content     = """<p>A treasury product is not only a yield surface. It needs clear balances, allocation history, exportable records, and enough context for internal review.</p>
<p>FloraFi demo data includes these concepts so teams can model how CMS-managed education pages and product cards connect to the app story.</p>"""

[[contents]]
type        = "post"
title       = "Webhook Patterns for Stablecoin Payments"
slug        = "webhook-patterns-stablecoin-payments"
image_url   = "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=900&h=650&fit=crop&q=80"
sort_order  = 3
category    = "developers"
tags        = ["api", "payments"]
excerpt     = "A practical approach to tracking deposits, transfers, redemptions, and payout state changes."
content     = """<p>Stablecoin payments become easier to operate when product teams subscribe to clear state transitions and reconcile them against internal ledgers.</p>
<p>Use webhook events for pending, settled, failed, and reversed flows, and keep idempotency keys in every integration path.</p>"""
