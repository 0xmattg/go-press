[theme]
name = "TerraTrail"
version = "1.0.0"
description = "A soft travel booking theme for mountain tours, transport planning, and destination guides."
author = "GoPress Team"

# Content types supported by the theme.
[[content_types]]
name = "product"
label = "旅行套餐"
label_plural = "旅行套餐"
archive_title_key = "page_title_product"
supports = ["title", "content", "excerpt", "thumbnail", "sort_order"]
taxonomies = ["category", "tag"]
has_archive = true
rewrite_slug = "products"
menu_icon = "blocks"
menu_order = 1

[[content_types]]
name = "service"
label = "交通服务"
label_plural = "交通服务"
archive_title_key = "page_title_service"
supports = ["title", "content", "excerpt", "thumbnail", "sort_order"]
taxonomies = ["category", "tag"]
has_archive = true
rewrite_slug = "services"
menu_icon = "edit"
menu_order = 2

[[content_types]]
name = "showcase"
label = "目的地指南"
label_plural = "目的地指南"
archive_title_key = "page_title_showcase"
supports = ["title", "content", "excerpt", "thumbnail", "sort_order"]
taxonomies = ["category", "tag"]
has_archive = true
rewrite_slug = "showcase"
menu_icon = "collection"
menu_order = 3

[[content_types.meta_fields]]
key = "client"
label = "向导/合作方"
type = "string"

[[content_types.meta_fields]]
key = "location"
label = "地区/国家"
type = "string"

# Menu locations supported by the theme.
[[menu_locations]]
name = "header"
label = "顶部导航"

[[menu_locations]]
name = "footer"
label = "底部导航"
