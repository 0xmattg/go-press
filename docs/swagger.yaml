definitions:
  core_api.apiError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  core_api.contentDTO:
    properties:
      author_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      excerpt:
        type: string
      id:
        type: integer
      image_url:
        type: string
      meta:
        additionalProperties:
          type: string
        type: object
      published_at:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
      status:
        type: string
      title:
        type: string
      type:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  core_api.pagination:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  core_api.response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/core_api.apiError'
      meta:
        $ref: '#/definitions/core_api.pagination'
      success:
        type: boolean
    type: object
info:
  contact: {}
paths:
  /content:
    get:
      consumes:
      - application/json
      description: Query content with filters, pagination, and sorting
      parameters:
      - description: Content type filter (e.g. product, post, service)
        in: query
        name: type
        type: string
      - default: published
        description: Status filter
        in: query
        name: status
        type: string
      - description: Search keyword in title and content
        in: query
        name: search
        type: string
      - description: Taxonomy name for filtering (requires term param)
        in: query
        name: taxonomy
        type: string
      - description: Taxonomy term slug (requires taxonomy param)
        in: query
        name: term
        type: string
      - description: Meta key for filtering (requires meta_value)
        in: query
        name: meta_key
        type: string
      - description: Meta value for filtering (requires meta_key)
        in: query
        name: meta_value
        type: string
      - default: created_at
        description: 'Sort field: created_at, updated_at, published_at, title, sort_order'
        in: query
        name: order_by
        type: string
      - default: DESC
        description: 'Sort direction: ASC or DESC'
        in: query
        name: order
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/core_api.response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/core_api.contentDTO'
                  type: array
                meta:
                  $ref: '#/definitions/core_api.pagination'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/core_api.response'
            - properties:
                error:
                  $ref: '#/definitions/core_api.apiError'
              type: object
      summary: List content items
      tags:
      - Content
  /content/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a single content item by numeric ID or slug (slug requires
        type-specific endpoint)
      parameters:
      - description: Content ID (numeric) or slug (string)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/core_api.response'
            - properties:
                data:
                  $ref: '#/definitions/core_api.contentDTO'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/core_api.response'
            - properties:
                error:
                  $ref: '#/definitions/core_api.apiError'
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/core_api.response'
            - properties:
                error:
                  $ref: '#/definitions/core_api.apiError'
              type: object
      summary: Get content by ID or slug
      tags:
      - Content
  /types:
    get:
      consumes:
      - application/json
      description: Return all registered content type definitions including fields,
        taxonomies, and rewrite rules
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/core_api.response'
      summary: List registered content types
      tags:
      - Content Types
swagger: "2.0"
