excerpt     = "IQ/OQ/PQ protocols and ISO 14644 classification testing — particle counts, airflow, pressure, temperature, and humidity mapping."
description = "IQ/OQ/PQ protocols and ISO 14644 classification testing — including particle counts, airflow uniformity, pressure differentials, temperature mapping, and HEPA integrity."
content     = """<h3>Comprehensive Validation</h3>
<p>Validation is not just a formality — it is the proof that your cleanroom performs as designed. Our validation engineers follow GAMP 5 principles and provide complete IQ/OQ/PQ documentation packages accepted by regulatory auditors worldwide.</p>

<h3>Testing Scope</h3>
<ul>
<li><strong>Particle count testing</strong> — ISO 14644-1 classification (at rest and in operation)</li>
<li><strong>HEPA filter integrity</strong> — DOP/PAO aerosol challenge per ISO 14644-3</li>
<li><strong>Airflow velocity & uniformity</strong> — Anemometer traverse per ISO 14644-3</li>
<li><strong>Pressure differential</strong> — Multi-point manometer mapping across all zones</li>
<li><strong>Temperature & humidity mapping</strong> — 24-hour data-logging at grid points</li>
<li><strong>Recovery test</strong> — Time to return to classification after contamination event</li>
<li><strong>Sound level measurement</strong> — Compliance with occupational limits</li>
<li><strong>Lighting level measurement</strong> — EN 12464-1 compliance</li>
</ul>

<h3>Deliverables</h3>
<p>Bound validation report with raw data, calibration certificates, deviation management, and summary of compliance. Re-qualification schedules recommended per ISO 14644-2.</p>"""

