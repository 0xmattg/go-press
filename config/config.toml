[site]
name = "My GoPress Site"
url = "http://localhost:8080"
language = "zh-CN"
timezone = "Local"
theme = "modern-company"

[server]
host = "0.0.0.0"
port = 8080
# Use "release" in production; "debug" enables verbose Gin logging locally.
mode = "release"

[pg]
user = "pguser"
password = "yourpassword"
hostname = "localhost"
port = "5432"
database = "yourdatabase"
schema = "public"
table_prefix = "gp_"
version = "v0"
max_open_conns = 100
max_idle_conns = 50
conn_max_lifetime = "30m"

[redis]
host = "localhost"
port = 6379
password = ""
db = 0

[cms]
# REQUIRED: set a unique, random secret (e.g. `openssl rand -base64 32`).
# The installer generates one automatically per site; the app refuses to start
# if this is left empty or set to a shared placeholder value.
jwt_secret = ""
jwt_expire_hours = 24
upload_dir = "web/static/uploads"
upload_max_size_mb = 10

[mail]
driver = "go-mail"
enabled = false
host = ""
port = 587
encryption = "starttls"
username = ""
mail_key = ""
from_email = ""
from_name = ""
reply_to = ""
timeout_seconds = 10
